name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare static site
        shell: bash
        run: |
          mkdir _site
          cp index.html style.css app.js profile.json .nojekyll _site/
          cp -R assets _site/assets

      - name: Upload static site
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
